name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Format and lint run as separate jobs so the workflow summary surfaces
  # them independently. Both are fast (no test compile); the heavier test
  # and build jobs gate on both passing.
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read pinned toolchain
        # rust-toolchain.toml is the single source of truth across local +
        # CI. dtolnay/rust-toolchain@master no longer auto-reads it, so we
        # extract the channel here and pass it explicitly. Edit the pin in
        # rust-toolchain.toml only.
        id: toolchain
        run: |
          channel=$(awk -F'"' '/^channel/{print $2}' rust-toolchain.toml)
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read pinned toolchain
        id: toolchain
        run: |
          channel=$(awk -F'"' '/^channel/{print $2}' rust-toolchain.toml)
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}
          components: clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [fmt, clippy]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read pinned toolchain
        id: toolchain
        run: |
          channel=$(awk -F'"' '/^channel/{print $2}' rust-toolchain.toml)
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        # Plain `cargo test --workspace` covers unit, integration, and doc
        # tests in one pass. The assembler is pure logic, so Linux is a
        # sufficient test host; the build job proves the other platforms
        # compile.
        run: cargo test --workspace

  # Cross-platform smoke compile. Proves the workspace builds on macOS
  # (primary dev host) and Windows without paying for a full test run
  # there. Assemblers pull no platform-specific deps, so no extra install.
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [fmt, clippy]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Read pinned toolchain
        id: toolchain
        shell: bash
        run: |
          channel=$(awk -F'"' '/^channel/{print $2}' rust-toolchain.toml)
          echo "channel=${channel}" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.toolchain.outputs.channel }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: build-${{ matrix.os }}

      - name: Check workspace
        run: cargo check --workspace --all-targets
