# release-plz configuration.
#
# Trigger: every push to main runs release-plz, which opens (or updates) a
# "chore: release" PR with a bumped workspace version and a CHANGELOG entry
# generated from the new commits (conventional-commit prefixes drive the
# bump). Merging that PR creates a git tag, which fires
# .github/workflows/release.yml (cargo-dist) to build the `asm198x` CLI and
# attach the archives to a GitHub Release.
#
# Versioning is lockstep: every workspace crate inherits its version from
# [workspace.package] in Cargo.toml, so a single bump applies everywhere.
#
# Cadence: merge the release PR when a CPU's work lands, so each release maps to
# roughly one CPU and its changelog stays focused — not after several pile up
# (which is how v0.0.4 became a wall). See decisions/release-cadence.md.
#
# publish = false: we do NOT publish to crates.io (the binary ships via the
# GitHub Release instead, and the generic `isa` crate name shouldn't be
# claimed there). git_release_enable = false: cargo-dist owns the GitHub
# Release, not release-plz — release-plz only bumps, changelogs, and tags.
[workspace]
publish = false
git_release_enable = false
git_tag_enable = true
changelog_update = true

# git_only = true: take the previous version from the git tag, not the
# crates.io registry. Required whenever publish = false — with no registry
# baseline, release-plz can't see the last release and never bumps the version
# (it reports "already up-to-date" and opens no release PR). See the umbrella
# project-skeleton-standard decision for the full story.
# (Must precede the [[package]] table below: it is a [workspace] key.)
git_only = true

# The `isa` crate is not dist-able (no binary) and never ships independently —
# it exists only as a dependency of `asm198x`. cargo-dist's release.yml fires on
# any version-like tag and errors on a non-dist-able package, so an `isa-vX.Y.Z`
# tag would produce a failed release run. Keep isa version-bumped (lockstep) but
# untagged; only `asm198x-vX.Y.Z` drives a release.
[[package]]
name = "isa"
git_tag_enable = false

# isa-disasm is the same case: no binary, dependency-only. Without this it takes
# the workspace default (git_tag_enable = true), so release-plz tags it and
# cargo-dist's release.yml fires on `isa-disasm-vX.Y.Z` and, finding no binary,
# produces a junk GitHub Release — it already did once (only a dist-manifest.json,
# and it grabbed the "Latest" badge). Keep it version-bumped in lockstep but
# untagged; only `asm198x-vX.Y.Z` drives a release.
[[package]]
name = "isa-disasm"
git_tag_enable = false

# dbg198x is the same case again: the debug-info format crate has no binary and
# ships only as a dependency (asm198x writes it, Emu198x reads it). Keep it
# version-bumped in lockstep but untagged, so a version tag never fires
# cargo-dist and mints a junk GitHub Release.
[[package]]
name = "dbg198x"
git_tag_enable = false
